<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 40px 20px;
    color: #333;
}

.card {
    max-width: 850px;
    margin: auto;
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

#progress {
    font-size: 14px;
    font-weight: 600;
    color: #666;
    margin-bottom: 10px;
}

.progress-bar {
    width: 100%;
    height: 10px;
    background: #e5e7eb;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 25px;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: #2563eb;
    transition: width 0.3s ease;
}

.question {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
}

.option {
    margin-bottom: 12px;
}

.option label {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

.option label:hover {
    border-color: #2563eb;
    background: #f8fbff;
}

.option input[type="radio"] {
    width: 18px;
    height: 18px;
}

button {
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
    margin-right: 10px;
}

#submitBtn {
    background: #2563eb;
    color: white;
}

#nextBtn {
    background: #10b981;
    color: white;
    display: none;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#result {
    margin-top: 20px;
    padding: 14px;
    border-radius: 10px;
    font-weight: 600;
}

.correct {
    background: #ecfdf5;
    color: #047857;
    border: 1px solid #a7f3d0;
}

.wrong {
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fecaca;
}

#explanation {
    margin-top: 15px;
    padding: 14px;
    border-radius: 10px;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    font-size: 14px;
    color: #334155;
    display: none;
}

#summary {
    display: none;
    text-align: center;
}

#score h3 {
    font-size: 40px;
    color: #2563eb;
}
</style>
</head>

<body>

<div id="quiz" class="card">

    <div id="progress"></div>

    <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <div id="question" class="question"></div>

    <div id="options"></div>

    <button id="submitBtn">Submit</button>
    <button id="nextBtn">Next</button>

    <div id="result"></div>

    <div id="explanation"></div>

</div>

<div id="summary" class="card">

    <h2>Kết quả</h2>

    <div id="score"></div>

    <button onclick="location.reload()">
        Làm lại
    </button>

</div>

function shuffle(array) {
    const result = [...array];
    for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
}

const explanationEl = document.getElementById("explanation");
const progressEl = document.getElementById("progress");
const progressFill = document.getElementById("progressFill");

const submitBtn = document.getElementById("submitBtn");
const nextBtn = document.getElementById("nextBtn");

// ================= LOAD =================

function loadQuestion() {

    const q = quizQuestions[currentIndex];

    progressEl.textContent =
        `Câu ${currentIndex + 1}/${quizQuestions.length}`;

    progressFill.style.width =
        ((currentIndex + 1) / quizQuestions.length) * 100 + "%";

    questionEl.textContent = q.question;

    optionsEl.innerHTML = q.options.map(opt => `
        <div class="option">
            <label>
                <input type="radio" name="answer" value="${opt}">
                <span>${opt}</span>
            </label>
        </div>
    `).join("");

    resultEl.innerHTML = "";
    explanationEl.style.display = "none";

    submitBtn.disabled = false;
    nextBtn.style.display = "none";
}

// ================= SUBMIT =================

function submitAnswer() {

    const q = quizQuestions[currentIndex];

    const selected =
        optionsEl.querySelector('input[name="answer"]:checked');

    if (!selected) {
        alert("Vui lòng chọn đáp án");
        return;
    }

    const isCorrect =
        selected.value === q.answer;

    if (isCorrect) {
        score++;
        resultEl.className = "correct";
        resultEl.innerHTML = "✓ Chính xác";
    } else {
        resultEl.className = "wrong";
        resultEl.innerHTML = "✗ Sai. Đáp án đúng: " + q.answer;
    }

    explanationEl.style.display = "block";
    explanationEl.innerHTML =
        "<b>Giải thích:</b><br>" + q.explanation;

    optionsEl.querySelectorAll("input")
        .forEach(x => x.disabled = true);

    submitBtn.disabled = true;
    nextBtn.style.display = "inline-block";
}

// ================= NEXT =================

function nextQuestion() {

    currentIndex++;

    if (currentIndex >= quizQuestions.length) {
        finishQuiz();
        return;
    }

    loadQuestion();
}

// ================= FINISH =================

function finishQuiz() {

    document.getElementById("quiz").style.display = "none";
    document.getElementById("summary").style.display = "block";

    const percent =
        Math.round(score * 100 / quizQuestions.length);

    document.getElementById("score").innerHTML = `
        <h3>${score}/${quizQuestions.length}</h3>
        <p>Đúng: ${percent}%</p>
    `;
}

// ================= EVENTS =================

submitBtn.addEventListener("click", submitAnswer);
nextBtn.addEventListener("click", nextQuestion);

// ================= START =================

loadQuestion();

</script>

</body>
</html>
